name: Deploy Backend

on:
  workflow_dispatch:   # run manually from GitHub Actions tab when EC2 is ready
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/college-Hop
            git pull origin main
            cd backend
            docker compose up -d --build
            docker compose ps
